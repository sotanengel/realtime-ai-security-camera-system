name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v5.4.1

      - name: Set up Python
        run: uv python install

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run ruff check (lint)
        run: uv run ruff check laptop/scripts/ src/ tests/

      - name: Run ruff format check
        run: uv run ruff format --check laptop/scripts/ src/ tests/

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: |
          yamllint -c .yamllint.yml \
            raspberry-pi/docker-compose.yml \
            raspberry-pi/config/frigate.yml \
            raspberry-pi/config/go2rtc.yml \
            laptop/docker-compose.yml \
            laptop/config/frigate.yml \
            laptop/config/go2rtc.yml \
            .pre-commit-config.yaml

      - name: Check GitHub Actions SHA pinning
        run: ./scripts/check-github-actions-pinning.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v5.4.1

      - name: Set up Python
        run: uv python install

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest tests/ -v
