# pip 設定ファイル（Takumi Guard 統合）
# 使用方法: pip install --config-file pip.conf -r requirements.txt
#
# Takumi Guard はパッケージインストール前に悪意あるパッケージを自動ブロックします。
# 設定の詳細・APIトークン取得は以下を参照してください:
# https://flatt.tech/takumi/features/guard

[global]
# Takumi Guard プロキシレジストリ
# （実際のエンドポイントURLはTakumiダッシュボードから取得してください）
# index-url = https://guard.takumi.flatt.tech/pypi/simple/

# Takumi Guard 未設定の場合は公式PyPIを使用（コメントを外してください）
index-url = https://pypi.org/simple/

# インストールログ保存（セキュリティ監査用）
log = /tmp/pip-install.log
